name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pip-audit
      - run: python -m pytest tests -q
        env:
          QINGQING_SESSION_SECRET: ci-session-secret-not-for-production
          QINGQING_CREDENTIAL_KEY: ci-credential-secret-not-for-production
      - run: python scripts/db_migrate.py
        env:
          QINGQING_DATABASE_PATH: .test-tmp/ci-schema.db
      - run: python -m pip_audit -r requirements.txt

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-integration.txt
      - run: python -m pip install -r backend/requirements-integration.txt
      - run: docker compose up -d --wait
      - run: python -m pytest backend/tests/test_smtp_login.py backend/tests/test_optional_integration.py -q
        env:
          QINGQING_RUN_INTEGRATION: '1'
          QINGQING_ALLOW_LOCAL_USER: 'true'
          QINGQING_SESSION_SECRET: ci-session-secret-not-for-production
          QINGQING_CREDENTIAL_KEY: ci-credential-secret-not-for-production
      - if: always()
        run: docker compose down -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high --registry=https://registry.npmjs.org

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/qingqing_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      # The checked-in golden is rendered on Windows; Linux font rasterization
      # differs slightly even with the same Flutter engine.
      - run: flutter test --exclude-tags=golden
      - run: flutter build web --release --dart-define=API_BASE_URL=https://api.example.invalid
      - run: flutter build apk --debug --dart-define=API_BASE_URL=https://api.example.invalid

  flutter-windows:
    runs-on: windows-latest
    env:
      TrackFileAccess: 'false'
    defaults:
      run:
        working-directory: apps/qingqing_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test --tags=golden
      - name: Install Visual C++ ATL if missing
        shell: pwsh
        run: |
          $installerRoot = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer"
          $vswhere = Join-Path $installerRoot "vswhere.exe"
          $setup = Join-Path $installerRoot "setup.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) { throw "Visual Studio C++ installation was not found" }
          $atl = Get-ChildItem $installPath -Filter atlstr.h -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $atl) {
            $arguments = "modify --installPath `"$installPath`" --add Microsoft.VisualStudio.Component.VC.ATL --quiet --norestart"
            $process = Start-Process -FilePath $setup -ArgumentList $arguments -PassThru -Wait
            if ($process.ExitCode -ne 0) { throw "ATL installation failed with exit code $($process.ExitCode)" }
          }
          $atl = Get-ChildItem $installPath -Filter atlstr.h -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $atl) { throw "Visual C++ ATL (atlstr.h) is still missing" }
      - run: flutter build windows --release --dart-define=API_BASE_URL=https://api.example.invalid
