# Optional production dependencies for local integration.
# Usage:
#   docker compose up -d
#   set QINGQING_DATABASE_URL=postgresql://qingqing:qingqing@localhost:5432/qingqing
#   set QINGQING_WORKER_MODE=redis
#   set QINGQING_REDIS_URL=redis://localhost:6379/0
#   set QINGQING_ARTIFACT_BACKEND=s3
#   set QINGQING_S3_ENDPOINT=http://localhost:9000
#   set QINGQING_S3_BUCKET=qingqing
#   set QINGQING_S3_ACCESS_KEY=minioadmin
#   set QINGQING_S3_SECRET_KEY=minioadmin

services:
  postgres:
    image: postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_USER: qingqing
      POSTGRES_PASSWORD: qingqing
      POSTGRES_DB: qingqing
    ports:
      - "5432:5432"
    volumes:
      - qingqing_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qingqing -d qingqing"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - qingqing_minio:/data

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/qingqing || true;
      exit 0;
      "

  # Local SMTP catcher for login closed-loop (no real outbound email).
  # SMTP: localhost:1025  UI: http://localhost:8025
  mailhog:
    image: mailhog/mailhog@sha256:8d76a3d4ffa32a3661311944007a415332c4bb855657f4f6c57996405c009bea
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  qingqing_pg:
  qingqing_minio:
