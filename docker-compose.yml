# Optional production dependencies for local integration.
# Usage:
#   docker compose up -d
#   set QINGQING_DATABASE_URL=postgresql://qingqing:qingqing@localhost:5432/qingqing
#   set QINGQING_WORKER_MODE=redis
#   set QINGQING_REDIS_URL=redis://localhost:6379/0
#   set QINGQING_ARTIFACT_BACKEND=s3
#   set QINGQING_S3_ENDPOINT=http://localhost:9000
#   set QINGQING_S3_BUCKET=qingqing
#   set QINGQING_S3_ACCESS_KEY=minioadmin
#   set QINGQING_S3_SECRET_KEY=minioadmin

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qingqing
      POSTGRES_PASSWORD: qingqing
      POSTGRES_DB: qingqing
    ports:
      - "5432:5432"
    volumes:
      - qingqing_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qingqing -d qingqing"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - qingqing_minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/qingqing || true;
      exit 0;
      "

  # Local SMTP catcher for login closed-loop (no real outbound email).
  # SMTP: localhost:1025  UI: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  qingqing_pg:
  qingqing_minio:
